services:
  webapp:
    image: practikaltask4
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8021:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 40s